name = "blossom-server"
compatibility_date = "2024-05-07"

main = "src/index.ts"

[triggers]
# clean r2 garbage every day at 3 AM
crons = ["0 3 * * *"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "WHITELIST_KV"
id = "mock-id-whitelist-kv"

[[r2_buckets]]
binding = "R2"
bucket_name = "mock-bucket-blossom"

[vars]
REQUIRE_WHITELIST = "true"
DEFAULT_EXPIRE_SECONDS = "2592000"
